<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法人信息登记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 28px 24px 32px;
            transition: all 0.2s ease;
        }

        /* 头部微信支付标识 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wechat-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #07C160;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }

        .header-title span {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .header-badge {
            background-color: #e8f8ee;
            color: #07C160;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #b7e9cc;
        }

        /* 表单字段 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333333;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-label .required {
            color: #ff4d4f;
            margin-right: 2px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            color: #1a1a1a;
            background-color: #f7f8fa;
            border: 1px solid #e5e6eb;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .form-input:focus {
            border-color: #07C160;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(7, 193, 96, 0.12);
        }

        .form-input::placeholder {
            color: #b0b3bf;
            font-size: 14px;
        }

        /* 微信支付推荐区域 */
        .promo-section {
            background: linear-gradient(135deg, #f0faf4 0%, #e8f8ee 100%);
            border-radius: 12px;
            padding: 16px 18px;
            margin: 26px 0 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #b7e9cc;
        }

        .promo-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .promo-icon {
            background-color: #07C160;
            color: #fff;
            font-size: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 600;
        }

        .promo-text .text {
            font-size: 15px;
            font-weight: 600;
            color: #1a7a3a;
            letter-spacing: 0.5px;
        }

        .promo-text .sub-text {
            font-size: 13px;
            color: #3d8b5e;
            font-weight: 400;
        }

        .wechat-pay-logo {
            background-color: #07C160;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* 底部推荐人信息 */
        .footer-recommend {
            background-color: #fafafa;
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #07C160;
        }

        .recommend-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .recommend-label {
            font-size: 14px;
            color: #666;
            font-weight: 400;
        }

        .recommend-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            background: #fff;
            padding: 2px 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .recommend-name small {
            font-weight: 400;
            color: #888;
            font-size: 13px;
        }

        .footer-wechat-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #07C160;
            color: #fff;
            padding: 4px 12px 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .footer-wechat-badge span {
            font-size: 16px;
            line-height: 1;
        }

        /* 操作按钮 */
        .action-btn {
            width: 100%;
            padding: 14px;
            margin-top: 28px;
            background-color: #07C160;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
        }

        .action-btn:active {
            background-color: #06ad56;
            transform: scale(0.98);
        }

        /* 提示信息 */
        .footnote {
            text-align: center;
            font-size: 12px;
            color: #b0b3bf;
            margin-top: 16px;
            letter-spacing: 0.2px;
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .card {
                padding: 20px 16px 24px;
            }
            .promo-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .promo-text .text {
                font-size: 14px;
            }
            .footer-recommend {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .header-title span {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 头部 -->
        <div class="header">
            <div class="header-title">
                <span class="wechat-icon">微信</span>
                <span>法人信息登记</span>
            </div>
            <div class="header-badge">认证</div>
        </div>

        <!-- 表单区域 -->
        <form id="infoForm" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label" for="legalPerson"><span class="required">*</span>法人：</label>
                <input type="text" id="legalPerson" class="form-input" placeholder="请输入法人姓名" value="">
            </div>

            <div class="form-group">
                <label class="form-label" for="entityName"><span class="required">*</span>主体名称：</label>
                <input type="text" id="entityName" class="form-input" placeholder="请输入企业/个体户全称" value="">
            </div>

            <div class="form-group">
                <label class="form-label" for="idNumber"><span class="required">*</span>身份证号：</label>
                <input type="text" id="idNumber" class="form-input" placeholder="请输入18位身份证号码" value="">
            </div>

            <div class="form-group">
                <label class="form-label" for="phone"><span class="required">*</span>手机号：</label>
                <input type="tel" id="phone" class="form-input" placeholder="请输入大陆手机号" value="">
            </div>

            <div class="form-group">
                <label class="form-label" for="business">业务：</label>
                <input type="text" id="business" class="form-input" placeholder="请简要描述经营业务" value="">
            </div>
        </form>

        <!-- 推荐使用微信支付 高亮区域 -->
        <div class="promo-section">
            <div class="promo-text">
                <div class="promo-icon">💚</div>
                <div>
                    <div class="text">推荐使用微信支付</div>
                    <div class="sub-text">安全 · 便捷 · 高效</div>
                </div>
            </div>
            <div class="wechat-pay-logo">微信支付</div>
        </div>

        <!-- 底部推荐人信息（依据图片内容） -->
        <div class="footer-recommend">
            <div class="recommend-info">
                <span class="recommend-label">推荐人 / 经办人：</span>
                <span class="recommend-name">寇云荣 <small>（**荣）</small></span>
            </div>
            <div class="footer-wechat-badge">
                <span>🟢</span> 微信支付
            </div>
        </div>

        <!-- 提交按钮 -->
        <button class="action-btn" onclick="handleSubmit()">确认提交</button>
        <div class="footnote">信息仅用于业务审核，我们将严格保密</div>
    </div>

    <script>
        // 简单交互反馈
        function handleSubmit() {
            const legal = document.getElementById('legalPerson').value.trim();
            const entity = document.getElementById('entityName').value.trim();
            const id = document.getElementById('idNumber').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!legal || !entity || !id || !phone) {
                alert('请完整填写法人、主体名称、身份证号及手机号（带 * 为必填）');
                return;
            }

            // 简单的身份证和手机号格式提示（非严格校验，仅演示）
            if (id.length !== 18) {
                alert('温馨提示：身份证号一般为18位，请核对后提交。');
                return;
            }
            if (!/^1\d{10}$/.test(phone)) {
                alert('温馨提示：手机号格式为11位数字，请核对后提交。');
                return;
            }

            alert('✅ 表单已提交（演示交互）\n\n法人：' + legal + '\n主体：' + entity + '\n业务：' + document.getElementById('business').value || '未填写');
        }

        // 按回车键可触发提交（增强体验）
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                e.preventDefault();
                handleSubmit();
            }
        });
    </script>

</body>
</html>
