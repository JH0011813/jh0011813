<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个体工商户报税线上代办服务</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== 卡片容器 ===== */
        .form-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px 35px 35px;
            max-width: 520px;
            width: 100%;
            transition: transform 0.2s ease;
        }
        .form-card:hover {
            transform: translateY(-5px);
        }

        /* ===== 标题区 ===== */
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header .icon {
            font-size: 42px;
            display: block;
            margin-bottom: 6px;
        }
        .form-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a2b4a;
            letter-spacing: 1px;
        }
        .form-header p {
            color: #7a8aa0;
            font-size: 14px;
            margin-top: 6px;
            border-top: 2px solid #eef2f7;
            padding-top: 12px;
            display: inline-block;
        }

        /* ===== 表单元素 ===== */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }
        .form-group label .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            background: #fafcff;
            transition: all 0.25s ease;
            outline: none;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #4f8cf7;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 140, 247, 0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group .hint {
            font-size: 12px;
            color: #8899b0;
            margin-top: 4px;
            padding-left: 4px;
        }

        /* ===== 提交按钮 ===== */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f8cf7, #6c5ce7);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(79, 140, 247, 0.35);
            margin-top: 8px;
        }
        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(79, 140, 247, 0.45);
        }
        .submit-btn:active {
            transform: scale(0.96);
        }

        /* ===== 底部小额说明 ===== */
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #a0b3cc;
            margin-top: 22px;
            border-top: 1px solid #edf2f7;
            padding-top: 18px;
        }

        /* ===== 弹窗遮罩 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #ffffff;
            border-radius: 32px;
            padding: 30px 25px 25px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.35s ease;
        }
        .modal-box h3 {
            font-size: 20px;
            color: #1a2b4a;
            margin-bottom: 8px;
        }
        .modal-box .sub {
            color: #6b7d98;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .modal-box img {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            border: 2px solid #eef2f7;
            object-fit: contain;
            background: #f8faff;
            margin: 6px 0 12px;
        }
        .modal-box .close-btn {
            background: #07c160;
            color: #fff;
            border: none;
            padding: 12px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
            box-shadow: 0 6px 18px rgba(7, 193, 96, 0.3);
        }
        .modal-box .close-btn:hover {
            background: #06ad56;
        }

        /* ===== 动画 ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .form-card {
                padding: 28px 20px 25px;
            }
            .form-header h1 {
                font-size: 22px;
            }
            .modal-box img {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主卡片 ===== -->
    <div class="form-card">
        <div class="form-header">
            <span class="icon">📋</span>
            <h1>个体工商户报税<br>线上代办服务</h1>
            <p>请如实填写以下信息</p>
        </div>

        <form id="taxForm" onsubmit="return false;">
            <!-- 法人 -->
            <div class="form-group">
                <label>法人 <span class="required">*</span></label>
                <input type="text" placeholder="请输入法人姓名" required>
            </div>

            <!-- 主体名称 -->
            <div class="form-group">
                <label>主体名称 <span class="required">*</span></label>
                <input type="text" placeholder="请输入个体工商户名称" required>
            </div>

            <!-- 身份证 -->
            <div class="form-group">
                <label>身份证号 <span class="required">*</span></label>
                <input type="text" placeholder="请输入18位身份证号码" required>
                <div class="hint">18位数字或最后一位为 X</div>
            </div>

            <!-- 手机号 -->
            <div class="form-group">
                <label>手机号 <span class="required">*</span></label>
                <input type="tel" placeholder="请输入11位手机号码" required>
                <div class="hint">11位中国大陆手机号</div>
            </div>

            <!-- 业务 -->
            <div class="form-group">
                <label>业务 <span class="required">*</span></label>
                <textarea placeholder="请描述主营业务范围，例如：餐饮服务、零售贸易、咨询服务等" required></textarea>
            </div>

            <!-- 提交按钮 -->
            <button type="submit" class="submit-btn" onclick="handleSubmit()">✔ 提交资料</button>
        </form>

        <div class="footer-note">
            ⚡ 提交后请扫码支付服务费，工作人员将即刻处理
        </div>
    </div>

    <!-- ===== 弹窗（收款码） ===== -->
    <div id="paymentModal" class="modal-overlay">
        <div class="modal-box">
            <h3>📱 扫码支付</h3>
            <p class="sub">支付完成后，我们将为您代办</p>
            <!-- ★★★ 请将下面 src 换成你自己的微信收款码图片路径 ★★★ -->
            <img src="wechat.jpg" alt="微信收款码">
            <br>
            <button class="close-btn" onclick="closeModal()">我已支付，关闭</button>
        </div>
    </div>

    <script>
        function handleSubmit() {
            // 获取所有带 required 的输入
            const inputs = document.querySelectorAll('#taxForm input[required], #taxForm textarea[required]');
            let empty = false;
            inputs.forEach(el => {
                if (el.value.trim() === '') empty = true;
            });
            if (empty) {
                alert('请完整填写所有带 * 的必填项！');
                return;
            }
            // 简单手机号校验（可选）
            const phone = document.querySelector('#taxForm input[type="tel"]');
            if (phone && !/^1\d{10}$/.test(phone.value.trim())) {
                alert('请输入正确的11位手机号！');
                return;
            }
            // 身份证简单校验（长度）
            const idCard = document.querySelector('#taxForm input[placeholder*="身份证"]');
            if (idCard && !/^\d{17}[\dXx]$/.test(idCard.value.trim())) {
                alert('请输入18位有效身份证号（最后一位可为X）');
                return;
            }
            // 弹出收款码
            document.getElementById('paymentModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.remove('active');
            // 可以加一个成功提示，也可重置表单
            alert('✅ 已收到您的报税申请，请留意后续审核通知。');
            // 可选：重置表单
            // document.getElementById('taxForm').reset();
        }

        // 点击遮罩背景也可以关闭（用户体验）
        document.getElementById('paymentModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });
    </script>

</body>
</html>
